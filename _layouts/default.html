<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  {%- include head.html -%}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <div class="aurora" aria-hidden="true">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>

  <div class="scroll-progress" id="scrollProgress" aria-hidden="true"></div>

  {%- include nav.html -%}

  <main id="main">
    {{ content }}
  </main>

  {%- include footer.html -%}

  <button class="to-top" id="toTop" aria-label="Back to top" title="Back to top">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
  </button>

  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
</body>
</html>
