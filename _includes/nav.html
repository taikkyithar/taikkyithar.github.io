{%- assign home = '/' | relative_url -%}
<header class="nav" id="siteNav">
  <div class="wrap nav-inner">
    <a href="{{ home }}" class="logo"><span class="dot"></span>Taikkyithar</a>

    <nav class="nav-links" id="navLinks" aria-label="Main">
      <a href="{{ home }}#about" data-nav="about">About</a>
      <a href="{{ home }}#skills" data-nav="skills">Skills</a>
      <a href="{{ home }}#experience" data-nav="experience">Experience</a>
      {%- comment -%}
        data-nav lets the scroll-spy light this up over the homepage #blog section.
        On /blog/ pages there are no spied sections, so the static .active stands.
      {%- endcomment -%}
      <a href="{{ '/blog/' | relative_url }}" data-nav="blog"{% if page.url contains '/blog' %} class="active" aria-current="page"{% endif %}>Blog</a>
      <a href="{{ '/tools/' | relative_url }}"{% if page.url contains '/tools' %} class="active" aria-current="page"{% endif %}>Tools</a>
      <a href="{{ home }}#contact" data-nav="contact">Contact</a>
    </nav>

    <div style="display:flex; gap:.6rem;">
      <button class="icon-btn" id="themeToggle" aria-label="Toggle colour theme" title="Toggle theme">
        <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      </button>
      <button class="icon-btn menu-btn" id="menuBtn" aria-label="Menu" aria-expanded="false" aria-controls="navLinks">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
  </div>
</header>
